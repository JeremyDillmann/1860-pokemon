// effectiveness: ATK>DEF>TECH>TAK>ATK, HERZ neutral
function typeEffect(atkType,defType){
  if(atkType==='HERZ'||defType==='HERZ')return 1;
  const i=TYPES.indexOf(atkType),j=TYPES.indexOf(defType);
  if(i<4&&j<4){
    if((i+1)%4===j)return 1.5;
    if((j+1)%4===i)return 0.66;
  }
  return 1;
}

function makePlayerInstance(id,level){
  const def=PLAYERS.find(p=>p.id===id);
  if(!def)return null;
  const lv=level||5;
  const hp=Math.floor(def.baseHp*(1+lv*0.12));
  return{
    id:def.id,name:def.name,types:[...def.types],level:lv,
    hp:hp,maxHp:hp,
    atk:Math.floor(def.baseAtk*(1+lv*0.1)),
    def:Math.floor(def.baseDef*(1+lv*0.1)),
    spd:Math.floor(def.baseSpd*(1+lv*0.1)),
    moral:80,xp:0,xpNext:lv*25+50,
    moves:def.moves.slice(0,4),
    desc:def.desc,era:def.era,
    atkBoost:0,defBoost:0
  };
}

function gainXP(player,amount){
  player.xp+=amount;
  let leveled=false;
  while(player.xp>=player.xpNext){
    player.xp-=player.xpNext;
    player.level++;
    const def=PLAYERS.find(p=>p.id===player.id);
    player.maxHp=Math.floor(def.baseHp*(1+player.level*0.12));
    player.hp=player.maxHp;
    player.atk=Math.floor(def.baseAtk*(1+player.level*0.1));
    player.def=Math.floor(def.baseDef*(1+player.level*0.1));
    player.spd=Math.floor(def.baseSpd*(1+player.level*0.1));
    player.xpNext=player.level*25+50;
    leveled=true;
  }
  return leveled;
}

// 16x16 tile sprites as arrays of color indices
const TILES={};

// grass tile - natural lawn with small flowers/clover
TILES.grass=(function(){
  const d=new Array(256).fill(2);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const i=y*16+x;
    // Base grass with natural variation
    const noise=Math.sin(x*2.5)*Math.cos(y*3.1)*0.5+0.5;
    if(noise>0.7)d[i]=3; // light patches
    else if(noise<0.2)d[i]=1; // shadow patches
    // Small grass tufts
    if((x%4===1)&&(y%5===2))d[i]=3;
    if((x%6===3)&&(y%4===0))d[i]=1;
    // Occasional tiny flower/clover
    if(x===5&&y===3)d[i]=3;
    if(x===11&&y===9)d[i]=3;
    if(x===2&&y===12)d[i]=1;
  }
  return d;
})();

// tall grass (encounters) - dense wild grass with visible blade pattern
TILES.tallgrass=(function(){
  const d=new Array(256).fill(2);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const i=y*16+x;
    // Dense base
    d[i]=((x+y)%3===0)?1:2;
    // Tall blades in regular pattern
    if(x%3===1){
      // Blade stem
      if(y>1&&y<14)d[i]=1;
      // Blade tips (lighter)
      if(y>0&&y<4)d[i]=3;
      if(y>8&&y<11)d[i]=3;
    }
    if(x%3===2){
      if(y>3&&y<8)d[i]=1;
      if(y>2&&y<5)d[i]=3;
      if(y>11&&y<15)d[i]=3;
    }
    // Swaying tips
    if(y===0&&(x%4===1||x%4===2))d[i]=3;
    if(y===1&&x%5===3)d[i]=3;
    // Ground shadow at base
    if(y===15)d[i]=1;
  }
  return d;
})();

TILES.path=(function(){
  const d=new Array(256).fill(2);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const i=y*16+x;
    // Cobblestone pattern: alternating bricks
    const brickRow=Math.floor(y/4);
    const offset=(brickRow%2)*4;
    const bx=(x+offset)%8;
    const by=y%4;
    // Brick edges (grout lines)
    if(by===0||bx===0){d[i]=1;} // dark grout
    else if(by===1&&bx===1){d[i]=3;} // highlight corner
    else{d[i]=Math.random()<0.15?3:2;} // brick surface with variation
  }
  // Add some wear/dirt spots
  for(let k=0;k<8;k++){
    const rx=Math.floor(Math.random()*14)+1;
    const ry=Math.floor(Math.random()*14)+1;
    d[ry*16+rx]=1;
  }
  return d;
})();

TILES.tree=(function(){
  const d=new Array(256).fill(0);
  // Trunk with bark texture
  for(let y=10;y<16;y++)for(let x=6;x<10;x++){
    d[y*16+x]=((x+y)%2===0)?3:1; // bark pattern
  }
  // Trunk base (wider)
  d[15*16+5]=3;d[15*16+10]=3;
  // Root hints
  d[14*16+5]=1;d[14*16+10]=1;
  // Leafy crown - layered circles for depth
  // Shadow layer (outer, darker)
  for(let y=0;y<12;y++)for(let x=0;x<16;x++){
    const dx=x-8,dy=y-5;
    if(dx*dx/(7*7)+dy*dy/(5.5*5.5)<1)d[y*16+x]=1;
  }
  // Mid layer
  for(let y=1;y<11;y++)for(let x=1;x<15;x++){
    const dx=x-8,dy=y-5;
    if(dx*dx/(6*6)+dy*dy/(4.5*4.5)<1)d[y*16+x]=2;
  }
  // Highlight clusters (top-left light source)
  for(let y=1;y<7;y++)for(let x=2;x<9;x++){
    const dx=x-5,dy=y-3;
    if(dx*dx+dy*dy<6)d[y*16+x]=3;
  }
  // Extra leaf detail bumps
  d[2*16+10]=3;d[3*16+12]=3;d[6*16+3]=3;
  d[8*16+5]=1;d[7*16+11]=1;d[9*16+8]=1;
  return d;
})();

TILES.building=(function(){
  const d=new Array(256).fill(0);
  // Foundation
  for(let x=0;x<16;x++)d[15*16+x]=1;
  // Main walls with brick texture
  for(let y=3;y<15;y++)for(let x=1;x<15;x++){
    const brickRow=Math.floor((y-3)/3);
    const offset=(brickRow%2)*3;
    const bx=(x+offset)%6;
    const by=(y-3)%3;
    if(by===0&&bx===0)d[y*16+x]=1; // mortar horizontal
    else if(bx===0&&by===1)d[y*16+x]=1; // mortar vertical
    else d[y*16+x]=2;
  }
  // Wall edges (darker)
  for(let y=3;y<15;y++){d[y*16+1]=1;d[y*16+14]=1;}
  // Pitched roof with shingles
  for(let y=0;y<4;y++){
    const left=Math.max(0,2-y);
    const right=Math.min(15,13+y);
    for(let x=left;x<=right;x++){
      if(x>=3-y&&x<=12+y){
        d[y*16+x]=((x+y)%2===0)?1:3; // alternating shingle pattern
      }
    }
  }
  // Roof peak
  d[0*16+7]=3;d[0*16+8]=3;
  // Chimney
  d[0*16+12]=1;d[1*16+12]=1;d[0*16+11]=1;d[1*16+11]=1;
  // Door with frame
  for(let y=10;y<15;y++)for(let x=6;x<10;x++)d[y*16+x]=1;
  for(let y=11;y<15;y++)for(let x=7;x<9;x++)d[y*16+x]=3; // door panels
  d[12*16+7]=2;d[12*16+8]=2; // door handle area
  d[10*16+6]=3;d[10*16+9]=3; // door frame top corners
  // Windows with frames and shutters
  // Left window
  for(let y=5;y<9;y++)for(let x=2;x<6;x++)d[y*16+x]=1; // frame
  for(let y=6;y<8;y++)for(let x=3;x<5;x++)d[y*16+x]=3; // glass
  d[6*16+3]=2; // window cross
  d[7*16+3]=2;
  // Right window
  for(let y=5;y<9;y++)for(let x=10;x<14;x++)d[y*16+x]=1;
  for(let y=6;y<8;y++)for(let x=11;x<13;x++)d[y*16+x]=3;
  d[6*16+11]=2;
  d[7*16+11]=2;
  // Window sills
  d[9*16+2]=3;d[9*16+3]=3;d[9*16+4]=3;d[9*16+5]=3;
  d[9*16+10]=3;d[9*16+11]=3;d[9*16+12]=3;d[9*16+13]=3;
  return d;
})();

TILES.portal=(function(){

  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const dx=x-8,dy=y-8,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<7&&dist>3)d[y*16+x]=((x+y)%3===0)?3:2;
    if(dist<=3&&dist>1)d[y*16+x]=1;
    if(dist<=1)d[y*16+x]=3;
  }

})();

// Table - round wooden table top view
TILES.table=(function(){
  const d=new Array(256).fill(0);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const dx=x-7.5,dy=y-7.5,dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<=6){
      d[i]=2; // table surface

// Beer keg - barrel shape
TILES.keg=(function(){
  const d=new Array(256).fill(0);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const i=y*16+x;
    // barrel body
    const cx=7.5,bulge=Math.sin((y/15)*Math.PI)*2;
    if(x>=4-bulge&&x<=11+bulge&&y>=2&&y<=13){

      if(y===7&&x>=6&&x<=9)d[i]=3; // tap
    }

  }
  return d;
})();

// Interior wall
TILES.wall_interior=(function(){
  const d=new Array(256).fill(1);
  for(let y=0;y<16;y++)for(let x=0;x<16;x++){
    const i=y*16+x;
    if(y%4===0||x%6===0)d[i]=1;
    else d[i]=2;
    // 1860 poster/pennant on some walls
    if(y>=4&&y<=8&&x>=5&&x<=10){d[i]=3;}
    if(y>=5&&y<=7&&x>=6&&x<=9){d[i]=1;} // lion silhouette
  }
  return d;
})();

function cacheTile(tileData,pal){
  const cv=document.createElement('canvas');
  cv.width=16;cv.height=16;
  const cx=cv.getContext('2d');
  for(let i=0;i<256;i++){
    const c=pal[tileData[i]];
    if(c==='transparent')continue;
    cx.fillStyle=c;
    cx.fillRect(i%16,Math.floor(i/16),1,1);
  }
  return cv;
}

}

// === AUDIO ===
let audioCtx=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playNote(freq,dur,type,vol){
  if(!audioCtx||!GS.musicOn)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type||'square';
  o.frequency.value=freq;
  g.gain.value=vol||0.08;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playMelody(notes,tempo){
  if(!audioCtx||!GS.musicOn)return;
  let t=0;
  notes.forEach(n=>{
    if(n[0]>0){
      setTimeout(()=>playNote(n[0],n[1]*(60/tempo),'square',0.06),t*1000);
    }
    t+=n[1]*(60/tempo);
  });
}

function playSFX(type){
  if(!audioCtx)return;
  if(type==='hit'){playNote(200,0.1,'square',0.1);setTimeout(()=>playNote(150,0.15,'square',0.08),100);}
  if(type==='superHit'){playNote(300,0.1,'square',0.12);setTimeout(()=>playNote(400,0.1,'square',0.1),80);setTimeout(()=>playNote(200,0.2,'square',0.08),160);}
  if(type==='miss'){playNote(100,0.3,'sawtooth',0.05);}
  if(type==='levelup'){
    [523,587,659,698,784].forEach((f,i)=>setTimeout(()=>playNote(f,0.15,'square',0.1),i*120));
  }
  if(type==='catch'){
    [400,500,600,800].forEach((f,i)=>setTimeout(()=>playNote(f,0.12,'square',0.1),i*100));
  }
  if(type==='select'){playNote(600,0.05,'square',0.06);}
  if(type==='confirm'){playNote(800,0.08,'square',0.08);}
  if(type==='encounter'){
    [300,400,350,450,500].forEach((f,i)=>setTimeout(()=>playNote(f,0.1,'square',0.1),i*80));
  }
  if(type==='victory'){
    const notes=[523,523,523,523,415,466,523,0,466,523];
    notes.forEach((f,i)=>{if(f>0)setTimeout(()=>playNote(f,0.2,'square',0.1),i*150);});
  }
}

let bgmInterval=null;
function startBGM(type){
  stopBGM();
  if(!audioCtx||!GS.musicOn)return;
  const melodies={
    title:[[392,1],[440,1],[494,1],[523,2],[494,1],[440,1],[392,2],[0,1],[349,1],[392,1],[440,1],[494,2],[440,1],[392,1],[349,2]],
    overworld:[[262,1],[294,1],[330,1],[349,1],[330,1],[294,1],[262,2],[0,1],[349,1],[330,1],[294,1],[262,1],[294,1],[330,1],[349,2]],
    battle:[[523,0.5],[494,0.5],[440,0.5],[494,0.5],[523,1],[440,0.5],[392,0.5],[440,1],[523,0.5],[587,0.5],[523,1],[494,0.5],[440,0.5],[392,1]]
  };
  const m=melodies[type];
  if(!m)return;
  const tempo=type==='battle'?160:120;
  let totalDur=0;
  m.forEach(n=>totalDur+=n[1]*(60/tempo));
  playMelody(m,tempo);
  bgmInterval=setInterval(()=>playMelody(m,tempo),totalDur*1000+200);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}

// === INPUT ===
const KEYS={};
let keyJustPressed={};
let _pendingKeys={};
document.addEventListener('keydown',e=>{
  KEYS[e.key]=true;
  _pendingKeys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(!audioCtx)initAudio();
});
document.addEventListener('keyup',e=>{KEYS[e.key]=false;});

// Touch controls
document.querySelectorAll('#touch button').forEach(btn=>{
  const k=btn.dataset.key;
  btn.addEventListener('touchstart',e=>{e.preventDefault();KEYS[k]=true;_pendingKeys[k]=true;if(!audioCtx)initAudio();});
  btn.addEventListener('touchend',e=>{e.preventDefault();KEYS[k]=false;});
  btn.addEventListener('mousedown',e=>{KEYS[k]=true;_pendingKeys[k]=true;if(!audioCtx)initAudio();});
  btn.addEventListener('mouseup',e=>{KEYS[k]=false;});
});

function justPressed(k){return keyJustPressed[k];}

function drawText(text,x,y,color,size){
  CTX.fillStyle=color||'#e8e8e0';
  CTX.font=(size||8)+'px monospace';
  CTX.fillText(text,x,y);
}

function drawBox(x,y,w,h,bg,border){
  CTX.fillStyle=bg||'#081820';
  CTX.fillRect(x,y,w,h);
  CTX.strokeStyle=border||'#e8e8e0';
  CTX.lineWidth=2;
  CTX.strokeRect(x+1,y+1,w-2,h-2);
}

function drawHP(x,y,w,cur,max,label){
  drawText(label||'HP',x,y-2,'#e8e8e0',8);
  CTX.fillStyle='#404040';
  CTX.fillRect(x+20,y-8,w,6);
  const pct=Math.max(0,cur/max);
  CTX.fillStyle=pct>0.5?'#2a8a2a':pct>0.25?'#d0a020':'#c04040';
  CTX.fillRect(x+20,y-8,w*pct,6);
  drawText(cur+'/'+max,x+20,y+4,'#e8e8e0',7);
}

function drawMoral(x,y,w,val){

  CTX.fillRect(x+20,y-8,w,4);
  CTX.fillStyle='#6abadc';
  CTX.fillRect(x+20,y-8,w*(val/100),4);
}

function updateTitle(){
  if(justPressed('ArrowUp')){GS.titleSel=(GS.titleSel+1)%2;playSFX('select');}
  if(justPressed('ArrowDown')){GS.titleSel=(GS.titleSel+1)%2;playSFX('select');}
  if(justPressed(' ')||justPressed('Enter')){
    playSFX('confirm');
    if(GS.titleSel===0){
      // New game
      newGame();
    } else {
      // Load
      if(!loadGame()){
        newGame();
      }
    }
    startBGM('overworld');
  }
}

  GS.items=[{id:'weissbier',qty:5},{id:'rasen',qty:3},{id:'brezn',qty:1},{id:'ruescherl',qty:2}];
  GS.badges=[false,false,false,false];
  GS.npcsDefeated={};
  initMaps();
  // Show intro dialog, then starter selection
  GS.starterSel=0;
  startDialog(
    ['Willkommen, junger Sechzger-Fan!',
     'Jemand versucht die Geschichte von TSV 1860 München auszulöschen!',
     'Du musst durch die Zeit reisen und die 4 Arena-Meister besiegen!',
     'Aber zuerst brauchst du einen Begleiter...'],
    ()=>{GS.mode='starterSelect';GS.starterSel=0;}
  );
}

const STARTERS=[
  {id:'boxer',name:'Münchner Boxer',types:'ANGRIFF / HERZ',desc:'Schnell und stark. Schlägt sich durch jedes Hindernis!'},
  {id:'starterturner',name:'Giesinger Turner',types:'DEFENSIV / TECHNIK',desc:'Stählerner Körper. Hält jedem Angriff stand!'},
  {id:'stuermer',name:'Straßenkicker',types:'TAKTIK / ANGRIFF',desc:'Clever und treffsicher. Immer den richtigen Spielzug parat!'}
];

function drawStarterSelect(){
  CTX.fillStyle='#081820';
  CTX.fillRect(0,0,W,H);

  // Title
  CTX.textAlign='center';
  CTX.fillStyle='#e8d840';
  CTX.font='bold 13px monospace';
  CTX.fillText('WÄHLE DEINEN BEGLEITER!',W/2,28);
  CTX.textAlign='left';

  // Draw 3 starter boxes
  const boxW=90,boxH=180,gap=10;
  const startX=(W-3*boxW-2*gap)/2;

  STARTERS.forEach((s,i)=>{
    const bx=startX+i*(boxW+gap);
    const by=45;
    const sel=i===GS.starterSel;

    // Box background
    CTX.fillStyle=sel?'#1a3a5c':'#0a1a2a';
    CTX.fillRect(bx,by,boxW,boxH);
    // Border
    CTX.strokeStyle=sel?'#e8d840':'#2a5a8c';
    CTX.lineWidth=sel?3:1;
    CTX.strokeRect(bx,by,boxW,boxH);

    // Sprite area
    const sprCol=i===0?'#c04040':i===1?'#2a8a2a':'#2a6aac';
    const sprColLt=i===0?'#e07070':i===1?'#5aba5a':'#6abadc';
    // Draw a simple character icon
    const cx=bx+boxW/2, cy=by+50;
    // Head
    CTX.fillStyle='#e0b080';
    CTX.fillRect(cx-8,cy-20,16,16);
    // Hair
    CTX.fillStyle='#6a4a2a';
    CTX.fillRect(cx-8,cy-22,16,6);
    // Body
    CTX.fillStyle=sprCol;
    CTX.fillRect(cx-10,cy-4,20,24);
    // Stripe detail
    CTX.fillStyle=sprColLt;
    CTX.fillRect(cx-6,cy,12,4);
    // Arms
    CTX.fillStyle=sprCol;
    if(i===0){
      // Boxer: fists up
      CTX.fillRect(cx-16,cy-4,6,12);
      CTX.fillRect(cx+10,cy-8,6,12);
      CTX.fillStyle='#c04040';
      CTX.fillRect(cx-16,cy-6,6,8); // glove
      CTX.fillRect(cx+10,cy-10,6,8); // glove
    } else if(i===1){
      // Turner: arms wide
      CTX.fillRect(cx-18,cy-2,8,6);
      CTX.fillRect(cx+10,cy-2,8,6);
    } else {
      // Kicker: one arm, ball at foot
      CTX.fillRect(cx-14,cy+2,4,10);
      CTX.fillRect(cx+10,cy+2,4,10);
      CTX.fillStyle='#e8e8e0';
      CTX.beginPath();
      CTX.arc(cx+4,cy+28,5,0,Math.PI*2);
      CTX.fill();
      CTX.fillStyle='#1a1a1a';
      CTX.fillRect(cx+2,cy+26,2,2);
      CTX.fillRect(cx+5,cy+28,2,2);
    }
    // Legs
    CTX.fillStyle='#1a3a5c';
    CTX.fillRect(cx-6,cy+20,5,12);
    CTX.fillRect(cx+1,cy+20,5,12);
    // Shoes
    CTX.fillStyle='#1a1a1a';
    CTX.fillRect(cx-7,cy+32,6,4);
    CTX.fillRect(cx+1,cy+32,6,4);

    // Name
    CTX.textAlign='center';
    CTX.fillStyle=sel?'#e8d840':'#e8e8e0';
    CTX.font='bold 9px monospace';
    CTX.fillText(s.name,bx+boxW/2,by+boxH-50);

    // Types
    CTX.fillStyle=sel?'#d0a020':'#808080';
    CTX.font='8px monospace';
    CTX.fillText(s.types,bx+boxW/2,by+boxH-38);

    // Description (word wrap)
    CTX.fillStyle=sel?'#e8e8e0':'#808080';
    CTX.font='7px monospace';
    const words=s.desc.split(' ');
    let line='',ly=by+boxH-24;
    words.forEach(w=>{
      const test=line+w+' ';
      if(CTX.measureText(test).width>boxW-8){
        CTX.fillText(line.trim(),bx+boxW/2,ly);
        line=w+' ';ly+=10;
      } else line=test;
    });
    if(line.trim())CTX.fillText(line.trim(),bx+boxW/2,ly);

    CTX.textAlign='left';
  });

  // Instructions
  const flash=Math.sin(GS.frameCount*0.1)>0;
  CTX.textAlign='center';
  CTX.fillStyle=flash?'#e8d840':'#d0a020';
  CTX.font='9px monospace';
  CTX.fillText('← → Wählen    SPACE Bestätigen',W/2,H-12);
  CTX.textAlign='left';
}

function updateStarterSelect(){
  if(justPressed('ArrowLeft')){GS.starterSel=(GS.starterSel+2)%3;playSFX('select');}
  if(justPressed('ArrowRight')){GS.starterSel=(GS.starterSel+1)%3;playSFX('select');}
  if(justPressed(' ')||justPressed('Enter')){
    playSFX('confirm');
    const chosen=STARTERS[GS.starterSel];
    GS.team=[makePlayerInstance(chosen.id,5)];
    startDialog(
      [chosen.name+' schließt sich dir an!',
       'Typ: '+chosen.types,
       'Viel Glück auf deiner Reise!',
       'Tipp: Im hohen Gras triffst du wilde Sportler. Besiege sie!',
       'Drücke M für das Menü.'],
      ()=>{GS.mode='overworld';}
    );
  }
}

// === OVERWORLD ===
function drawOverworld(){
  const map=MAPS[GS.map];
  if(!map)return;

  // Camera offset (center on player)
  const camX=Math.max(0,Math.min(GS.px*TW-W/2+TW/2,MW*TW-W));
  const camY=Math.max(0,Math.min(GS.py*TH-H/2+TH/2,MH*TH-H));

  const startTX=Math.floor(camX/TW);
  const startTY=Math.floor(camY/TH);
  const endTX=Math.min(MW-1,startTX+Math.ceil(W/TW)+1);
  const endTY=Math.min(MH-1,startTY+Math.ceil(H/TH)+1);

  const isSepia=GS.map===1;

  const isInterior=GS.map>=5;
  CTX.fillStyle=isSepia?'#5a4a2a':isInterior?'#1a1a1a':'#1a5a1a';
  CTX.fillRect(0,0,W,H);

  // Draw tiles
  for(let ty=startTY;ty<=endTY;ty++){
    for(let tx=startTX;tx<=endTX;tx++){
      const tile=map.tiles[ty]?map.tiles[ty][tx]:0;
      const sx=tx*TW-camX,sy=ty*TH-camY;
      let tc=null;
      if(tile===0)tc=isSepia?TILE_CACHE.grass_s:TILE_CACHE.grass;
      else if(tile===1)tc=isSepia?TILE_CACHE.tallgrass_s:TILE_CACHE.tallgrass;
      else if(tile===2)tc=isSepia?TILE_CACHE.path_s:TILE_CACHE.path;
      else if(tile===3)tc=isSepia?TILE_CACHE.tree_s:TILE_CACHE.tree;
      else if(tile===4)tc=isSepia?TILE_CACHE.building_s:TILE_CACHE.building;
      else if(tile===5)tc=TILE_CACHE.water;
      else if(tile===6)tc=TILE_CACHE.portal;
      else if(tile===7)tc=isSepia?TILE_CACHE.arena_s:TILE_CACHE.arena;
      else if(tile===8)tc=TILE_CACHE.sign;
      else if(tile===9)tc=TILE_CACHE.floor;
      else if(tile===10)tc=TILE_CACHE.bar;
      else if(tile===11)tc=TILE_CACHE.table;
      else if(tile===12)tc=TILE_CACHE.keg;
      else if(tile===13)tc=TILE_CACHE.wall_interior;
      if(tc)CTX.drawImage(tc,sx,sy);
    }
  }

  // Draw 1860 Graffiti next to Kneipen buildings (only on Giesing map)
  if(GS.map===0){
    const graffitiSpots=[[7,13],[7,16],[13,13],[13,16]]; // next to each Kneipe
    graffitiSpots.forEach(([gx,gy])=>{
      const sx=gx*TW-camX,sy=gy*TH-camY;
      if(sx>-TW&&sx<W+TW&&sy>-TH&&sy<H+TH){
        drawGraffiti(CTX,sx+1,sy+6);
      }
    });
  }

  // Draw NPCs
  map.npcs.forEach(npc=>{
    if(npc.battle&&GS.npcsDefeated[npc.defKey])return;
    const nx=npc.x*TW-camX,ny=npc.y*TH-camY;
    if(nx>-TW&&nx<W+TW&&ny>-TH&&ny<H+TH){
      CTX.drawImage(npc.sprite,nx,ny);
    }
  });

  // Draw player
  const dirs=['down','up','left','right'];
  const frame=PLAYER_FRAMES[dirs[GS.pdir]+'_'+GS.pwalk];
  if(frame){
    const px=GS.px*TW-camX,py=GS.py*TH-camY;
    CTX.drawImage(frame,px,py);
  }

  // Map name overlay
  const mapNames=['Giesing','Alter Bot. Garten 1848','Grünwalder 1966','Olympia 1994','Grünwalder Neu 2024','Schönstüberl','Trepperlwirt','Kastaniengarten','Kyso'];
  drawBox(2,2,140,16,'rgba(8,24,32,0.8)');
  drawText(mapNames[GS.map]||'???',6,14,'#e8d840',9);

  // Badge count
  const bc=GS.badges.filter(b=>b).length;
  drawBox(W-80,2,78,16,'rgba(8,24,32,0.8)');
  drawText('Abz: '+bc+'/4',W-76,14,'#e8e8e0',9);
}

function updateOverworld(){
  if(GS.moveTimer>0){GS.moveTimer--;return;}

  let dx=0,dy=0;
  if(KEYS['ArrowUp']){dy=-1;GS.pdir=1;}
  else if(KEYS['ArrowDown']){dy=1;GS.pdir=0;}
  else if(KEYS['ArrowLeft']){dx=-1;GS.pdir=2;}
  else if(KEYS['ArrowRight']){dx=1;GS.pdir=3;}

  if(dx!==0||dy!==0){
    const nx=GS.px+dx,ny=GS.py+dy;
    const map=MAPS[GS.map];
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH){
      const tile=map.tiles[ny][nx];

      // Check NPC collision
      let npcHit=null;
      map.npcs.forEach(npc=>{
        if(npc.x===nx&&npc.y===ny){
          if(!npc.battle||!GS.npcsDefeated[npc.defKey])npcHit=npc;
        }
      });

      if(npcHit){
        // Face NPC
        GS.moveTimer=8;
      } else if(!BLOCKED.has(tile)){
        GS.px=nx;GS.py=ny;
        GS.pwalk=(GS.pwalk+1)%2;
        GS.moveTimer=6;

        // Check portal
        map.portals.forEach(p=>{
          if(p.x===nx&&p.y===ny){
            startTransition('portal',{map:p.toMap,x:p.toX,y:p.toY});
          }
        });

        // Check arena
        if(tile===7){
          const leaderIdx=GS.map-1;
          if(leaderIdx>=0&&leaderIdx<4){
            if(GS.badges[leaderIdx]){
              startDialog(['Du hast diese Arena bereits','aus dem Viertel gejagt! Weiter so!'],null);
            } else {
              const leader=ARENA_LEADERS[leaderIdx];
              // Reset leader team HP
              leader.team.forEach(p=>{p.hp=p.maxHp;p.moral=80;p.atkBoost=0;p.defBoost=0;});
              startDialog(leader.dialog,()=>{
                startBattle(leader.team.map(p=>({...p,hp:p.maxHp,moral:80})),true,leaderIdx);
              });
            }
          }
        }

        // Wild encounter on tall grass - mostly Bayern fans!
        if(tile===1&&Math.random()<GS.wildChance){
          const era=GS.map===0?0:GS.map;
          // 70% chance Bayern fan, 30% other sportler
          const isBayernFan=Math.random()<0.7;
          let wildPool;
          if(isBayernFan){
            const bayernIds={0:['bayernfan1','bayernfan2','bayernfan3'],1:['bayernfan_alt'],2:['bayernfan_66'],3:['bayernfan_94'],4:['bayernfan_now']};
            const pool=bayernIds[GS.map]||bayernIds[0];
            const pickId=pool[Math.floor(Math.random()*pool.length)];
            const lvl=Math.max(3,Math.floor(GS.team[0].level+(Math.random()*4-2)));
            const wild=makePlayerInstance(pickId,lvl);
            playSFX('encounter');
            startTransition('encounter',{enemy:[wild],isArena:false,arenaIdx:-1});
          } else {
            wildPool=PLAYERS.filter(p=>(p.era===era||p.era===(GS.map===0?1:era))&&!p.id.startsWith('bayern'));
            if(wildPool.length>0){
              const pick=wildPool[Math.floor(Math.random()*wildPool.length)];
              const lvl=Math.max(3,Math.floor(GS.team[0].level+(Math.random()*4-2)));
              const wild=makePlayerInstance(pick.id,lvl);
              playSFX('encounter');
              startTransition('encounter',{enemy:[wild],isArena:false,arenaIdx:-1});
            }
          }
        }
      }
    }
  }

  // Interact (Space)
  if(justPressed(' ')||justPressed('Enter')){
    const map=MAPS[GS.map];
    const faceDirs=[[0,1],[0,-1],[-1,0],[1,0]];
    const fx=GS.px+faceDirs[GS.pdir][0],fy=GS.py+faceDirs[GS.pdir][1];

    // Check NPC
    map.npcs.forEach(npc=>{
      if(npc.x===fx&&npc.y===fy){
        if(npc.battle&&GS.npcsDefeated[npc.defKey]){
          startDialog(['...','(Bereits aus dem Viertel gejagt)'],null);
        } else if(npc.battle&&!npc.defeated){
          startDialog(npc.dialog,()=>{
            npc.team.forEach(p=>{p.hp=p.maxHp;p.moral=80;p.atkBoost=0;p.defBoost=0;});
            startBattle(npc.team.map(p=>({...p})),false,-1,npc.defKey);
          });
        } else if(npc.shop){
          // Shop NPC
          const shop=npc.shop;
          const itemDef=ITEMS[shop.itemId];
          if(shop.price===0){
            // Free item (Weißbier-Hansi)
            startDialog(npc.dialog,()=>{
              const existing=GS.items.find(it=>it.id===shop.itemId);
              if(existing)existing.qty+=2;
              else GS.items.push({id:shop.itemId,qty:2});
              startDialog([itemDef.name+' x2 erhalten!','Prost, Löwe!'],null);
            });
          } else {
            const currItem=GS.items.find(it=>it.id===shop.currency);
            const currName=ITEMS[shop.currency]?ITEMS[shop.currency].name:shop.currency;
            const hasEnough=currItem&&currItem.qty>=shop.price;
            startDialog(npc.dialog,()=>{
              if(hasEnough){
                startDialog([itemDef.name+' kostet '+shop.price+' '+currName+'.','Du hast genug! Kaufen?','(SPACE = Ja)'],()=>{
                  const curr=GS.items.find(it=>it.id===shop.currency);
                  if(curr&&curr.qty>=shop.price){
                    curr.qty-=shop.price;
                    const existing=GS.items.find(it=>it.id===shop.itemId);
                    if(existing)existing.qty++;
                    else GS.items.push({id:shop.itemId,qty:1});
                    playSFX('confirm');
                    startDialog([itemDef.name+' gekauft!','Viel Spaß damit, Löwe!'],null);
                  }
                });
              } else {
                startDialog(['Du brauchst '+shop.price+' '+currName+'!','Du hast nicht genug...','Komm später wieder!'],null);
              }
            });
          }
        } else {
          startDialog(npc.dialog,null);
        }
      }
    });

    // Check sign
    const tile=map.tiles[fy]&&map.tiles[fy][fx];
    if(tile===8){
      const signTexts={
        0:{'3_6':'Portal nach 1848','27_6':'Portal nach 1966','3_16':'Portal nach 1994','27_16':'Portal nach 2024'},
        1:{'15_18':'Zurück nach Giesing'},
        2:{'15_18':'Zurück nach Giesing'},
        3:{'15_18':'Zurück nach Giesing'},
        4:{'15_18':'Zurück nach Giesing'}
      };
      const key=fx+'_'+fy;
      const txt=(signTexts[GS.map]&&signTexts[GS.map][key])||'Ein Schild.';
      startDialog([txt],null);
    }
  }

  // Menu
  if(justPressed('m')||justPressed('Escape')){
    GS.mode='menu';GS.menuIdx=0;GS.menuSub=0;
    playSFX('select');
  }
}

// === TRANSITIONS ===
function startTransition(type,data){
  GS.mode='transition';
  GS.transType=type;
  GS.transTo=data;
  GS.transTimer=0;
}

function updateTransition(){
  GS.transTimer++;
  if(GS.transType==='portal'||GS.transType==='encounter'){
    if(GS.transTimer>=30){
      if(GS.transType==='portal'){
        GS.map=GS.transTo.map;
        GS.px=GS.transTo.x;
        GS.py=GS.transTo.y;
        GS.mode='overworld';
        // Reinit NPCs defeated state
      } else {
        startBattle(GS.transTo.enemy,GS.transTo.isArena,GS.transTo.arenaIdx);
      }
    }
  }
}

function drawTransition(){
  // Draw underlying overworld
  drawOverworld();
  // Overlay effect
  const p=GS.transTimer/30;
  if(GS.transType==='portal'){
    CTX.fillStyle='rgba(128,64,224,'+Math.min(1,p*2)+')';
    CTX.fillRect(0,0,W,H);
  } else if(GS.transType==='encounter'){
    // Horizontal stripe wipe
    const stripes=8;
    const sh=H/stripes;
    for(let i=0;i<stripes;i++){
      const progress=Math.min(1,p*2-i*0.08);
      if(progress>0){
        CTX.fillStyle='#081820';
        if(i%2===0)CTX.fillRect(0,i*sh,W*progress,sh);
        else CTX.fillRect(W*(1-progress),i*sh,W*progress,sh);
      }
    }
  }
}

// === DIALOG ===
function startDialog(lines,cb){
  if(GS.mode!=='dialog') GS._prevMode=GS.mode;
  GS.mode='dialog';
  GS.dialogLines=lines;
  GS.dialogIdx=0;
  GS.dialogChar=0;
  GS.dialogTimer=0;
  GS.dialogCb=cb;
}

function drawDialog(){
  // Draw background (overworld or battle or starter)
  if(GS.battleState)drawBattleField();
  else if(GS._prevMode==='starterSelect')drawStarterSelect();
  else drawOverworld();

  // Dialog box - bigger for 2 lines
  drawBox(8,H-76,W-16,68,'rgba(8,24,32,0.95)','#e8e8e0');

  const line=GS.dialogLines[GS.dialogIdx]||'';
  const shown=line.substring(0,GS.dialogChar);
  drawText(shown,16,H-58,'#e8e8e0',10);

  // Show second line (next line) once current is fully typed
  if(GS.dialogChar>=line.length && GS.dialogIdx+1<GS.dialogLines.length){
    drawText(GS.dialogLines[GS.dialogIdx+1],16,H-42,'#e8e8e0',10);
  }

  // Indicator - show arrow when ready to advance
  if(GS.dialogChar>=line.length){
    const blink=Math.sin(GS.frameCount*0.15)>0;
    if(blink)drawText('▼',W-28,H-16,'#e8d840',10);
  }
}

function updateDialog(){
  GS.dialogTimer++;
  const line=GS.dialogLines[GS.dialogIdx]||'';
  if(GS.dialogChar<line.length){
    if(GS.dialogTimer%2===0)GS.dialogChar++;
  }
  if(justPressed(' ')||justPressed('Enter')){
    if(GS.dialogChar<line.length){
      // Fast-forward current line
      GS.dialogChar=line.length;
    } else {
      // Advance by 2 (since we show 2 lines at once)
      GS.dialogIdx+=2;
      GS.dialogChar=0;
      GS.dialogTimer=0;
      if(GS.dialogIdx>=GS.dialogLines.length){
        if(GS.dialogCb){
          const cb=GS.dialogCb;
          GS.dialogCb=null;
          cb();
        } else {
          GS.mode=GS.battleState?'battle':(GS._prevMode||'overworld');
        }
      }
    }
  }
}

function updateMenu(){
  if(GS.menuSub===0){
    if(justPressed('ArrowUp')){GS.menuIdx=(GS.menuIdx-1+4)%4;playSFX('select');}
    if(justPressed('ArrowDown')){GS.menuIdx=(GS.menuIdx+1)%4;playSFX('select');}
    if(justPressed(' ')||justPressed('Enter')){
      playSFX('confirm');
      if(GS.menuIdx===0){GS.menuSub=1;GS.menuTeamIdx=0;}
      else if(GS.menuIdx===1){GS.menuSub=2;GS.menuTeamIdx=0;}
      else if(GS.menuIdx===2){saveGame();startDialog(['Spiel gespeichert!'],()=>{GS.mode='menu';});}
      else{GS.mode='overworld';}
    }
    if(justPressed('x')||justPressed('Escape')||justPressed('m')){GS.mode='overworld';}
  }
  else if(GS.menuSub===1){
    if(justPressed('ArrowUp')){GS.menuTeamIdx=Math.max(0,GS.menuTeamIdx-1);playSFX('select');}
    if(justPressed('ArrowDown')){GS.menuTeamIdx=Math.min(GS.team.length-1,GS.menuTeamIdx+1);playSFX('select');}
    if(justPressed('x')||justPressed('Escape')){GS.menuSub=0;}
  }
  else if(GS.menuSub===2){
    const items=GS.items.filter(it=>it.qty>0);
    if(justPressed('ArrowUp')){GS.menuTeamIdx=Math.max(0,GS.menuTeamIdx-1);playSFX('select');}
    if(justPressed('ArrowDown')){GS.menuTeamIdx=Math.min(items.length-1,GS.menuTeamIdx+1);playSFX('select');}
    if(justPressed(' ')&&items.length>0){
      // Use item on first team member (simple)
      const it=items[GS.menuTeamIdx];
      if(it&&GS.team.length>0){
        const target=GS.team[0];
        ITEMS[it.id].effect(target);
        it.qty--;
        playSFX('confirm');
        startDialog([ITEMS[it.id].name+' benutzt!',target.name+' wurde geheilt!'],()=>{GS.mode='menu';GS.menuSub=2;});
      }
    }
    if(justPressed('x')||justPressed('Escape')){GS.menuSub=0;}
  }
}

// === BATTLE SYSTEM ===
function startBattle(enemyTeam,isArena,arenaIdx,npcKey){
  stopBGM();
  GS.mode='battle';
  GS.battleState={
    phase:'intro', // intro,select,enemySelect,animate,result,catch,xp,end
    player:GS.team[0],
    playerIdx:0,
    enemy:enemyTeam[0],
    enemyIdx:0,
    enemyTeam:enemyTeam,
    isArena:isArena,
    arenaIdx:arenaIdx,
    npcKey:npcKey||null,
    moveIdx:0,
    msg:'',
    msgTimer:0,
    animTimer:0,
    animType:'',
    shakeP:0,shakeE:0,
    flashP:0,flashE:0,
    introTimer:0,
    resultTimer:0,
    xpGain:0,
    caught:false,
    won:false,
    phaseQueue:[]
  };
  setTimeout(()=>startBGM('battle'),500);
}

function drawBattleField(){
  const bs=GS.battleState;
  if(!bs)return;

  // Background
  CTX.fillStyle='#081820';CTX.fillRect(0,0,W,H);

  // Battle ground
  CTX.fillStyle='#2a5a2a';
  CTX.fillRect(0,140,W,148);
  CTX.fillStyle='#1a4a1a';
  CTX.beginPath();CTX.ellipse(240,160,60,20,0,0,Math.PI*2);CTX.fill();
  CTX.beginPath();CTX.ellipse(80,200,60,20,0,0,Math.PI*2);CTX.fill();

  // Enemy sprite (top right)
  const esprite=getBattleSprite(bs.enemy.id);
  let ex=200+bs.shakeE,ey=60;
  if(bs.flashE>0){CTX.globalAlpha=bs.flashE%4<2?0.3:1;}
  CTX.drawImage(esprite,ex,ey,48,48);
  CTX.globalAlpha=1;

  // Player sprite (bottom left)
  const psprite=getBattleSprite(bs.player.id);
  let px=40+bs.shakeP,py=150;
  if(bs.flashP>0){CTX.globalAlpha=bs.flashP%4<2?0.3:1;}
  CTX.drawImage(psprite,px,py,48,48);
  CTX.globalAlpha=1;

  // Enemy info box
  drawBox(140,10,170,50,'rgba(8,24,32,0.9)');
  drawText(bs.enemy.name,148,26,'#e8e8e0',9);
  drawText('Lv'+bs.enemy.level+' '+bs.enemy.types.join('/'),148,38,'#6abadc',7);
  drawHP(148,52,100,bs.enemy.hp,bs.enemy.maxHp,'HP');
  drawMoral(248,52,50,bs.enemy.moral);

  // Player info box
  drawBox(10,110,170,50,'rgba(8,24,32,0.9)');
  drawText(bs.player.name,18,126,'#e8e8e0',9);
  drawText('Lv'+bs.player.level+' '+bs.player.types.join('/'),18,138,'#6abadc',7);
  drawHP(18,152,100,bs.player.hp,bs.player.maxHp,'HP');
  drawMoral(118,152,50,bs.player.moral);
}

function drawBattle(){
  const bs=GS.battleState;
  if(!bs)return;

  drawBattleField();

  // Phase-specific UI
  if(bs.phase==='intro'){
    drawBox(10,H-60,W-20,52,'rgba(8,24,32,0.95)');
    const introMsg=bs.isArena?'Arena-Kampf!':'Ein wilder '+bs.enemy.name+' erscheint!';
    drawText(introMsg,20,H-40,'#e8d840',10);
    drawText('SPACE zum Starten',20,H-22,'#808080',8);
  }
  else if(bs.phase==='select'){
    // Move selection
    drawBox(10,H-80,W-20,72,'rgba(8,24,32,0.95)');
    drawText('Attacke wählen:',20,H-66,'#e8d840',9);
    bs.player.moves.forEach((mId,i)=>{
      const m=MOVES[mId];
      if(!m)return;
      const sel=i===bs.moveIdx;
      const col=sel?'#e8d840':'#808080';
      const x=20+(i%2)*150,y=H-50+Math.floor(i/2)*20;
      drawText((sel?'▶':'  ')+m.name,x,y,col,9);
      if(sel){
        drawText(m.type+' Pw:'+m.power+' Ac:'+m.acc+'%',20,H-14,'#6abadc',7);
      }
    });
  }
  else if(bs.phase==='animate'||bs.phase==='enemySelect'){
    drawBox(10,H-40,W-20,32,'rgba(8,24,32,0.95)');
    drawText(bs.msg,20,H-22,'#e8e8e0',9);
  }
  else if(bs.phase==='result'){
    drawBox(10,H-40,W-20,32,'rgba(8,24,32,0.95)');
    drawText(bs.msg,20,H-22,'#e8e8e0',9);
  }
  else if(bs.phase==='catch'){
    drawBox(10,H-60,W-20,52,'rgba(8,24,32,0.95)');
    drawText(bs.enemy.name+' schließt sich',20,H-42,'#e8d840',10);
    drawText('deinem Team an!',20,H-26,'#e8d840',10);
  }
  else if(bs.phase==='xp'){
    drawBox(10,H-60,W-20,52,'rgba(8,24,32,0.95)');
    drawText(bs.msg,20,H-42,'#e8e8e0',10);
  }
  else if(bs.phase==='end'){
    drawBox(10,H-50,W-20,42,'rgba(8,24,32,0.95)');
    drawText(bs.msg,20,H-32,'#e8e8e0',10);
  }
}

function calcDamage(attacker,defender,moveId){
  const m=MOVES[moveId];
  if(!m||m.power===0)return 0;
  let dmg=Math.floor((m.power*(attacker.atk+attacker.atkBoost*5))/(defender.def+defender.defBoost*5+20));
  // Type effectiveness
  const eff=typeEffect(m.type,defender.types[0]);
  dmg=Math.floor(dmg*eff);
  // Moral bonus
  if(attacker.moral>80&&Math.random()<0.15)dmg=Math.floor(dmg*1.5); // crit
  if(attacker.moral<40&&Math.random()<0.2)return 0; // miss from low morale
  // Random variance
  dmg=Math.floor(dmg*(0.85+Math.random()*0.3));
  return Math.max(1,dmg);
}

function updateBattle(){
  const bs=GS.battleState;
  if(!bs)return;

  // Shake decay
  if(bs.shakeP!==0)bs.shakeP=bs.shakeP>0?bs.shakeP-1:bs.shakeP+1;
  if(bs.shakeE!==0)bs.shakeE=bs.shakeE>0?bs.shakeE-1:bs.shakeE+1;
  if(bs.flashP>0)bs.flashP--;
  if(bs.flashE>0)bs.flashE--;

  if(bs.phase==='intro'){
    bs.introTimer++;
    if(justPressed(' ')){bs.phase='select';bs.moveIdx=0;}
  }
  else if(bs.phase==='select'){
    const nMoves=bs.player.moves.length;
    if(justPressed('ArrowLeft')){bs.moveIdx=(bs.moveIdx-1+nMoves)%nMoves;playSFX('select');}
    if(justPressed('ArrowRight')){bs.moveIdx=(bs.moveIdx+1)%nMoves;playSFX('select');}
    if(justPressed('ArrowUp')){bs.moveIdx=(bs.moveIdx-2+nMoves)%nMoves;playSFX('select');}
    if(justPressed('ArrowDown')){bs.moveIdx=(bs.moveIdx+2)%nMoves;playSFX('select');}
    if(justPressed(' ')){
      playSFX('confirm');
      executePlayerMove(bs);
    }
  }
  else if(bs.phase==='animate'){
    bs.animTimer++;
    if(bs.animTimer>40){
      // Check if enemy fainted
      if(bs.enemy.hp<=0){
        bs.phase='result';
        bs.msg=bs.enemy.name+' aus dem Viertel gejagt!';
        bs.resultTimer=0;
        bs.won=true;
      } else {
        // Enemy turn
        executeEnemyMove(bs);
      }
    }
  }
  else if(bs.phase==='enemySelect'){
    bs.animTimer++;
    if(bs.animTimer>40){
      // Check player fainted
      if(bs.player.hp<=0){
        // Try next team member
        let nextIdx=-1;
        for(let i=0;i<GS.team.length;i++){
          if(i!==bs.playerIdx&&GS.team[i].hp>0){nextIdx=i;break;}
        }
        if(nextIdx>=0){
          bs.playerIdx=nextIdx;
          bs.player=GS.team[nextIdx];
          bs.msg=bs.player.name+' tritt an!';
          bs.phase='animate';bs.animTimer=20;
        } else {
          bs.phase='end';
          bs.msg='Alle Spieler besiegt... Zurück nach Giesing!';
          bs.won=false;
          bs.resultTimer=0;
        }
      } else {
        bs.phase='select';bs.moveIdx=0;
      }
    }
  }
  else if(bs.phase==='result'){
    bs.resultTimer++;
    if(justPressed(' ')&&bs.resultTimer>20){
      if(bs.won){
        // Check if more enemies
        let nextE=-1;
        for(let i=bs.enemyIdx+1;i<bs.enemyTeam.length;i++){
          if(bs.enemyTeam[i].hp>0){nextE=i;break;}
        }
        if(nextE>=0){
          bs.enemyIdx=nextE;
          bs.enemy=bs.enemyTeam[nextE];
          bs.msg=bs.enemy.name+' tritt an!';
          bs.phase='animate';bs.animTimer=20;
          bs.won=false;
        } else {
          // All enemies defeated
          if(!bs.isArena){
            // Wild: catch
            const alreadyHave=GS.team.some(p=>p.id===bs.enemyTeam[0].id);
            if(!alreadyHave&&GS.team.length<6){
              bs.phase='catch';
              bs.caught=true;
              playSFX('catch');
            } else {
              // XP
              handleXPPhase(bs);
            }
          } else {
            handleXPPhase(bs);
          }
          // Mark NPC defeated
          if(bs.npcKey)GS.npcsDefeated[bs.npcKey]=true;
        }
      } else {
        // Lost
        if(justPressed(' ')){
          endBattle(false);
        }
      }
    }
  }
  else if(bs.phase==='catch'){
    if(justPressed(' ')){
      const wild=bs.enemyTeam[0];
      GS.team.push(makePlayerInstance(wild.id,wild.level));
      playSFX('catch');
      handleXPPhase(bs);
    }
  }
  else if(bs.phase==='xp'){
    bs.resultTimer++;
    if(justPressed(' ')&&bs.resultTimer>10){
      if(bs.isArena){
        const idx=bs.arenaIdx;
        if(idx>=0&&idx<4){
          GS.badges[idx]=true;
          const leader=ARENA_LEADERS[idx];
          // Give reward player
          if(!GS.team.some(p=>p.id===leader.reward)&&GS.team.length<6){
            GS.team.push(makePlayerInstance(leader.reward,bs.enemyTeam[bs.enemyTeam.length-1].level));
          }
          stopBGM();
          playSFX('victory');
          // Check if all badges
          if(GS.badges.every(b=>b)){
            startDialog(['GLÜCKWUNSCH!','Alle Bayern-Schweine aus dem','Viertel gejagt! TSV 1860 ist','gerettet! EINMAL LÖWE, IMMER LÖWE!'],()=>{
              GS.battleState=null;GS.mode='overworld';startBGM('overworld');
            });
          } else {
            startDialog(leader.winDialog,()=>{
              GS.battleState=null;GS.mode='overworld';startBGM('overworld');
            });
          }
          return;
        }
      }
      endBattle(true);
    }
  }
  else if(bs.phase==='end'){
    bs.resultTimer++;
    if(justPressed(' ')&&bs.resultTimer>20){
      endBattle(bs.won);
    }
  }
}

function executePlayerMove(bs){
  const moveId=bs.player.moves[bs.moveIdx];
  const m=MOVES[moveId];
  bs.phase='animate';bs.animTimer=0;

  // Check accuracy
  const accMod=bs.player.moral<40?0.8:1;
  if(Math.random()*100>m.acc*accMod){
    bs.msg=bs.player.name+': '+m.name+' - Daneben!';
    playSFX('miss');
    return;
  }

  if(m.power>0){
    const dmg=calcDamage(bs.player,bs.enemy,moveId);
    bs.enemy.hp=Math.max(0,bs.enemy.hp-dmg);
    const eff=typeEffect(m.type,bs.enemy.types[0]);
    bs.shakeE=6;
    if(eff>1){bs.flashE=12;playSFX('superHit');bs.msg=bs.player.name+': '+m.name+'! Sehr effektiv! -'+dmg+'HP';}
    else if(eff<1){playSFX('hit');bs.msg=bs.player.name+': '+m.name+'... Nicht effektiv. -'+dmg+'HP';}
    else{playSFX('hit');bs.msg=bs.player.name+': '+m.name+'! -'+dmg+'HP';}
    bs.enemy.moral=Math.max(0,bs.enemy.moral-3);
    if(m.moralDmg)bs.enemy.moral=Math.max(0,bs.enemy.moral-m.moralDmg);
  } else if(m.stat==='def'){
    bs.player.defBoost+=m.boost;
    bs.msg=bs.player.name+': '+m.name+'! Verteidigung steigt!';
    playSFX('confirm');
  } else if(m.stat==='atk'){
    bs.player.atkBoost+=m.boost;
    bs.msg=bs.player.name+': '+m.name+'! Angriff steigt!';
    playSFX('confirm');
  } else if(m.heal){
    bs.player.moral=Math.min(100,bs.player.moral+m.heal);
    bs.msg=bs.player.name+': '+m.name+'! Moral steigt!';
    playSFX('confirm');
  }
}

function executeEnemyMove(bs){
  // AI: pick random move
  const moveId=bs.enemy.moves[Math.floor(Math.random()*bs.enemy.moves.length)];
  const m=MOVES[moveId];
  bs.phase='enemySelect';bs.animTimer=0;

  if(!m){bs.msg='...';return;}

  const accMod=bs.enemy.moral<40?0.8:1;
  if(Math.random()*100>m.acc*accMod){
    bs.msg=bs.enemy.name+': '+m.name+' - Daneben!';
    playSFX('miss');
    return;
  }

  if(m.power>0){
    const dmg=calcDamage(bs.enemy,bs.player,moveId);
    bs.player.hp=Math.max(0,bs.player.hp-dmg);
    const eff=typeEffect(m.type,bs.player.types[0]);
    bs.shakeP=6;
    if(eff>1){bs.flashP=12;playSFX('superHit');bs.msg=bs.enemy.name+': '+m.name+'! Sehr effektiv! -'+dmg+'HP';}
    else{playSFX('hit');bs.msg=bs.enemy.name+': '+m.name+'! -'+dmg+'HP';}
    bs.player.moral=Math.max(0,bs.player.moral-2);
    if(m.moralDmg)bs.player.moral=Math.max(0,bs.player.moral-m.moralDmg);
  } else if(m.stat==='def'){
    bs.enemy.defBoost+=m.boost;
    bs.msg=bs.enemy.name+': '+m.name+'! Verteidigung steigt!';
  } else if(m.stat==='atk'){
    bs.enemy.atkBoost+=m.boost;
    bs.msg=bs.enemy.name+': '+m.name+'! Angriff steigt!';
  } else if(m.heal){
    bs.enemy.moral=Math.min(100,bs.enemy.moral+m.heal);
    bs.msg=bs.enemy.name+': '+m.name+'! Moral steigt!';
  }
}

function handleXPPhase(bs){
  const xpGain=bs.enemyTeam.reduce((s,e)=>s+e.level*8,0);
  bs.xpGain=xpGain;
  const leveled=gainXP(bs.player,xpGain);
  // Reward: Weißbier after each fight
  const wbReward=Math.random()<0.5?1:0;
  if(wbReward>0){
    const wb=GS.items.find(it=>it.id==='weissbier');
    if(wb)wb.qty+=wbReward;else GS.items.push({id:'weissbier',qty:wbReward});
  }
  bs.phase='xp';bs.resultTimer=0;
  bs.msg=bs.player.name+' erhält '+xpGain+' XP!'+(leveled?' LEVEL UP!':'')+(wbReward>0?' +1 Weißbier!':'');
  if(leveled)playSFX('levelup');
}

function endBattle(won){
  stopBGM();
  GS.battleState=null;
  if(!won){
    // Heal and send back to Giesing
    GS.team.forEach(p=>{p.hp=Math.max(1,Math.floor(p.maxHp*0.3));p.moral=50;});
    GS.map=0;GS.px=15;GS.py=10;
  }
  GS.mode='overworld';
  startBGM('overworld');
}

// === SAVE/LOAD ===
function saveGame(){
  const data={
    map:GS.map,px:GS.px,py:GS.py,pdir:GS.pdir,
    team:GS.team,items:GS.items,badges:GS.badges,
    npcsDefeated:GS.npcsDefeated
  };
  localStorage.setItem('tsvRPG',JSON.stringify(data));
  GS.saved=true;
}

function loadGame(){
  const raw=localStorage.getItem('tsvRPG');
  if(!raw)return false;
  try{
    const data=JSON.parse(raw);
    GS.map=data.map;GS.px=data.px;GS.py=data.py;GS.pdir=data.pdir||0;
    GS.team=data.team||[];GS.items=data.items||[];GS.badges=data.badges||[false,false,false,false];
    GS.npcsDefeated=data.npcsDefeated||{};
    // Restore functions lost in serialization
    GS.team.forEach(p=>{
      const def=PLAYERS.find(d=>d.id===p.id);
      if(def&&!p.moves)p.moves=def.moves.slice(0,4);
    });
    initMaps();
    GS.mode='overworld';
    return true;
  }catch(e){return false;}
}

// === MAIN LOOP ===
function gameLoop(){
  GS.frameCount++;
  keyJustPressed={};

  // Process input
  for(const k in keyJustPressed)keyJustPressed[k]=false;
}

// We need to handle justPressed properly
let prevKeys={};
function processInput(){
  // Merge event-driven presses with edge-detection
  const merged={..._pendingKeys};
  for(const k in KEYS){
    if(KEYS[k]&&!prevKeys[k])merged[k]=true;
  }
  keyJustPressed=merged;
  _pendingKeys={};
  prevKeys={...KEYS};
}

function update(){
  processInput();
  GS.frameCount++;

  switch(GS.mode){
    case 'title':updateTitle();break;
    case 'starterSelect':updateStarterSelect();break;
    case 'overworld':updateOverworld();break;
    case 'battle':updateBattle();break;
    case 'dialog':updateDialog();break;
    case 'menu':updateMenu();break;
    case 'transition':updateTransition();break;
  }
}

function draw(){
  CTX.clearRect(0,0,W,H);
  switch(GS.mode){
    case 'title':drawTitle();break;
    case 'starterSelect':drawStarterSelect();break;
    case 'overworld':drawOverworld();break;
    case 'battle':drawBattle();break;
    case 'dialog':drawDialog();break;
    case 'menu':drawMenu();break;
    case 'transition':drawTransition();break;
  }
}

function mainLoop(){
  update();
  draw();
  if(document.hidden){setTimeout(mainLoop,16);}else{requestAnimationFrame(mainLoop);}
}

// === INIT ===
function init(){
  initTileCache();
  initPlayerSprite();
  initMaps();
  GS.mode='title';
  GS.titleTimer=0;
  GS.titleSel=0;
  mainLoop();
}

init();
</script>
